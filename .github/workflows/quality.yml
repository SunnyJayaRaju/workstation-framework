name: Shell Quality

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Shell Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt bats

      - name: Verify Bash syntax
        run: |
          find scripts -type f -name "*.sh" -exec bash -n {} +

      - name: Run ShellCheck
        run: |
          find scripts -type f -name "*.sh" -exec shellcheck -x {} +

      - name: Verify shell formatting
        run: |
          find scripts -type f -name "*.sh" -exec shfmt -d {} +

      - name: Run Bats tests
        run: |
          bats tests
